<!DOCTYPE html>
<html>
<head><title>Posts</title></head>
<body>
  <h1>Posts ({{ total_posts }} total)</h1>
  <ul>
    {% for post in posts %}
      <li>
        <a href="{% url 'posts:detail' post.pk %}">{{ post.title }}</a>
        {% if post.published_at %} &mdash; {{ post.published_at|date:"N j, Y" }}{% endif %}
      </li>
    {% empty %}
      <li>No posts yet.</li>
    {% endfor %}
  </ul>
</body>
</html>
