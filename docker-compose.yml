services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: django_skeleton
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "uv run manage.py migrate && uv run manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: django_skeleton
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
